<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle — Oh No It's Today</title>
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'default';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="wordle-page">

  <!-- ── Titlebar ──────────────────────────────────────────── -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-app">Oh No It's Today</span>
    </div>
    <div class="titlebar-controls">
      <button type="button" class="titlebar-btn" onclick="minimizeWindow()" title="Minimize">─</button>
      <button type="button" class="titlebar-btn titlebar-btn-close" onclick="closeWindow()" title="Close">✕</button>
    </div>
  </div>

  <!-- ── Toast Messages ────────────────────────────────────── -->
  <div id="toast-container" class="wordle-toast-container"></div>

  <!-- ── Main ──────────────────────────────────────────────── -->
  <div class="container">

    <header class="header" style="padding-top:12px">
      <div style="display:flex;align-items:baseline;gap:10px">
        <span class="header-title">Wordle</span>
        <span id="wordle-number" style="font-size:13px;color:var(--text-dimmer);font-family:var(--font-body)"></span>
      </div>
      <a href="/" class="footer-link" style="font-size:12px">← back</a>
    </header>
    <hr class="header-rule">

    <div class="wordle-game-area">

      <!-- Board -->
      <div id="wordle-board" class="wordle-board"></div>

      <!-- Result line (shown after game ends) -->
      <div id="wordle-result" class="wordle-result"></div>

      <!-- Keyboard -->
      <div id="wordle-keyboard" class="wordle-keyboard"></div>

    </div>
  </div>

  <script src="/static/wordle.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Ball — Oh No It's Today</title>
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'default';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="weball-page">

  <!-- ── Titlebar ──────────────────────────────────────────── -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-app">Oh No It's Today</span>
    </div>
    <div class="titlebar-controls">
      <button type="button" class="titlebar-btn" onclick="minimizeWindow()" title="Minimize">─</button>
      <button type="button" class="titlebar-btn titlebar-btn-close" onclick="closeWindow()" title="Close">✕</button>
    </div>
  </div>

  <!-- ── App Shell ─────────────────────────────────────────── -->
  <div class="wb-shell">

    <div class="container" style="width:550px">
      <header class="header" style="padding-top:24px">
        <div style="display:flex;align-items:baseline;gap:10px">
          <span class="header-title">We Ball</span>
          <span id="wb-balance-display" style="font-size:13px;color:var(--text-dimmer);font-family:var(--font-body)"></span>
        </div>
        <a href="/" class="footer-link">← back</a>
      </header>
      <hr class="header-rule">
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: Pre-Race
    ═══════════════════════════════════════════════════════════ -->
    <div id="wb-screen-prerace" class="wb-screen container">

      <!-- Circuit name -->
      <p id="wb-circuit-name" class="wb-circuit-display"></p>

      <!-- Weather + Season -->
      <div class="wb-meta-row">
        <span id="wb-weather-badge" class="wb-badge"></span>
        <span id="wb-season-badge"  class="wb-badge wb-badge--dim"></span>
      </div>

      <!-- Lore Headlines -->
      <div id="wb-headlines" class="wb-headlines"></div>

      <!-- Racers -->
      <h3 class="wb-subheading">Pick Your Racer</h3>
      <div id="wb-racer-options" class="wb-racer-grid"></div>

      <!-- Wager -->
      <div class="wb-wager-row">
        <label class="settings-label" style="margin:0;white-space:nowrap">Wager</label>
        <input id="wb-wager-input" type="number" min="1" class="settings-input wb-wager-input" value="5">
        <div class="wb-wager-shortcuts">
          <button class="wb-chip" onclick="setWager(1)">1</button>
          <button class="wb-chip" onclick="setWager(5)">5</button>
          <button class="wb-chip" onclick="setWager(10)">10</button>
          <button class="wb-chip" id="wb-chip-all" onclick="setWagerAll()">all</button>
        </div>
      </div>

      <!-- AI Bets -->
      <h3 class="wb-subheading">The Field</h3>
      <div id="wb-ai-bets" class="wb-ai-grid"></div>

      <!-- Pool preview -->
      <p id="wb-pool-preview" class="wb-pool-preview"></p>

      <!-- CTA -->
      <button id="wb-race-btn" class="wb-cta" onclick="startRaceFromBet()">Race ↗</button>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: Race Canvas
    ═══════════════════════════════════════════════════════════ -->
    <div id="wb-screen-race" class="wb-screen wb-screen--race" style="display:none">
      <canvas id="wb-canvas"></canvas>
      <div class="wb-race-info">
        <span id="wb-circuit-name" class="wb-circuit-name"></span>
        <span id="wb-race-status"  class="wb-race-status"></span>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: Results
    ═══════════════════════════════════════════════════════════ -->
    <div id="wb-screen-results" class="wb-screen container" style="display:none">
      <div id="wb-result-content"></div>
      <div class="wb-result-actions">
        <button class="btn-secondary" onclick="showScreen('archive')">archive</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: Already Raced Today
    ═══════════════════════════════════════════════════════════ -->
    <div id="wb-screen-done" class="wb-screen container" style="display:none">
      <p class="wb-subheading">Today's race is done.</p>
      <div id="wb-done-summary" class="wb-done-summary"></div>
      <div class="wb-result-actions">
        <button class="btn-secondary" onclick="startReplay()">replay</button>
        <button class="btn-secondary" onclick="showScreen('archive')">archive</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: Archive
    ═══════════════════════════════════════════════════════════ -->
    <div id="wb-screen-archive" class="wb-screen container" style="display:none">
      <div class="wb-archive-header">
        <span class="wb-subheading" style="margin:0">Archive</span>
        <button class="footer-link" onclick="showScreen('done-or-prerace')">← back</button>
      </div>
      <div id="wb-archive-list"></div>
    </div>

  </div><!-- /wb-shell -->

  <script src="/static/f1tracks.js"></script>
  <script src="/static/weball.js"></script>
</body>
</html>
